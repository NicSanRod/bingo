<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear usuario</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e1e2f,#2b2b45);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:420px;
            background:#35355c;
            padding:35px;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,.3);
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            font-size:2rem;
        }

        .subtitle{
            text-align:center;
            color:#cfcfe6;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#444470;
            color:white;
            font-size:1rem;
            margin-bottom:25px;
        }

        input::placeholder{
            color:#b8b8d4;
        }

        input:focus{
            outline:none;
            background:#505080;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#5b8cff;
            color:white;
            font-size:1rem;
            cursor:pointer;
            transition:.2s;
        }

        button:hover{
            background:#7aa2ff;
        }

        .links{
            margin-top:25px;
            display:flex;
            justify-content:space-between;
        }

        .links a{
            color:#cfcfe6;
            text-decoration:none;
        }

        .links a:hover{
            color:white;
        }
    </style>
</head>
<body>

<div class="card">

    <h1>👤 Crear usuario</h1>

    <p class="subtitle">
        Crea una cuenta para empezar a jugar.
    </p>

    <form method="POST">

        <label for="nombre">Nombre de usuario</label>

        <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Introduce un nombre"
            maxlength="100"
            required
        >

        <button type="submit">
            Crear usuario
        </button>

    </form>

    <div class="links">
        <a href="/">⬅ Volver</a>
        <a href="/login">¿Ya tienes cuenta?</a>
    </div>

</div>

</body>
</html>
