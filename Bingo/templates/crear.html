<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Bingo</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #1e1e2f, #2b2b45);
            color:white;
            min-height:100vh;
            padding:30px;
        }

        .container{
            max-width:1000px;
            margin:auto;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            font-size:3rem;
        }

        .subtitle{
            text-align:center;
            color:#cfcfe6;
            margin-bottom:40px;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            flex-wrap:wrap;
            gap:15px;
        }

        .back-btn{
            background:#444470;
            color:white;
            padding:12px 20px;
            border-radius:12px;
            text-decoration:none;
            transition:0.2s;
        }

        .back-btn:hover{
            background:#5b5b8f;
        }

        .controls{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
        }

        select, button{
            padding:12px 18px;
            border:none;
            border-radius:12px;
            font-size:1rem;
        }

        select{
            background:#35355c;
            color:white;
        }

        button{
            background:#5b8cff;
            color:white;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background:#7aa2ff;
        }

        .bingo-grid{
            display:grid;
            grid-template-columns: repeat(5, 1fr);
            gap:15px;
            margin-top:20px;
        }

        .cell{
            background:#35355c;
            border-radius:16px;
            padding:15px;
            min-height:120px;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
            transition:0.2s;
        }

        .cell:hover{
            background:#444470;
        }

        textarea{
            width:100%;
            height:100%;
            resize:none;
            border:none;
            outline:none;
            background:transparent;
            color:white;
            text-align:center;
            font-size:0.95rem;
        }

        textarea::placeholder{
            color:#b8b8d4;
        }

        .actions{
            margin-top:40px;
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .save-btn{
            background:#28c76f;
        }

        .save-btn:hover{
            background:#3ee084;
        }

        .random-btn{
            background:#ff9f43;
        }

        .random-btn:hover{
            background:#ffb866;
        }

        @media(max-width:900px){
            .bingo-grid{
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media(max-width:600px){
            .bingo-grid{
                grid-template-columns: repeat(2, 1fr);
            }

            h1{
                font-size:2rem;
            }
        }
    </style>
</head>
<body>

    <form method="POST">

    <div class="top-bar">

        <a href="/" class="back-btn">⬅ Volver</a>
        <select name="tamaño">
            <option>5x5</option>
            <option>4x4</option>
            <option>3x3</option>
        </select>

        <input 
            type="text" 
            name="nombre"
            placeholder="Nombre del bingo"
            style="padding:12px; border-radius:10px; border:none;"
            required
        >

    </div>

    <div class="bingo-grid">

        {% for i in range(tamaño*tamaño) %}
        <div class="cell">
            <textarea 
                name="reto"
                placeholder="Escribe un reto..."
                maxlength="80"
                required
            ></textarea>
        </div>
        {% endfor %}

    </div>

    <div class="actions">

        <button type="submit" class="save-btn">
            💾 Guardar Bingo
        </button>

    </div>

</form>

</body>

</html>
