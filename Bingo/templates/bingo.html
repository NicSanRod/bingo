<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ bingo.nombre }}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f1724 0%, #1f2a44 100%);
            color: #e6eef8;
            min-height: 100vh;
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 18px 0 6px;
            font-size: 2.25rem;
            text-align: center;
            letter-spacing: 0.6px;
            text-shadow: 0 3px 10px rgba(0, 0, 0, .6);
        }

        .subtitle {
            color: #c9d7f2;
            margin-bottom: 14px;
            font-size: .98rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            width: 100%;
            margin-top: 18px;
            padding: 6px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, .01));
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(2, 6, 23, .6);
        }

        .cell {
            background: linear-gradient(180deg, #2f3250, #383a5b);
            border-radius: 12px;
            padding: 12px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            transition: .2s;
            border: 1px solid rgba(255, 255, 255, .03);
            box-shadow: 0 6px 14px rgba(2, 6, 23, .45);
        }

        .cell.active {
            background: linear-gradient(180deg, #2dc26b, #28c76f);
            color: #07210b;
        }

        .cell img {
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .back {
            background: #35355c;
            padding: 10px 14px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
        }

        .back:hover {
            background: #444470;
        }

        .btn {
            margin-top: 10px;
            background: #5b8cff;
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #7aa2ff;
        }

        .win {
            margin-top: 25px;
            background: #2dc26b;
            color: #07210b;
            padding: 15px 25px;
            border-radius: 12px;
            display: none;
            font-size: 1.3rem;
            font-weight: bold;
        }

        @media(max-width:700px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <a href="/mis-bingos" class="back">⬅ Volver</a>
    </div>

    <h1>{{ bingo.nombre }}</h1>
    <p class="subtitle">
        Completa los retos subiendo una fotografía.
    </p>

    <div class="grid">

        {% for reto in retos %}

        <div class="cell {% if reto.completado %}active{% endif %}" data-id="{{ reto.id }}" onclick="toggle(this)">

            <p style="font-weight:bold;">
                {{ reto.reto.texto }}
            </p>

            {% if reto.imagen %}

            <img src="{{ reto.imagen }}">

            {% endif %}

        

            <form action="/subir/{{ reto.id }}" method="POST" enctype="multipart/form-data"
                onclick="event.stopPropagation()">

                <input type="file" name="imagen" id="file-{{ reto.id }}" hidden onchange="this.form.submit()">

                <button type="button" class="btn"
                    onclick="event.stopPropagation(); document.getElementById('file-{{ reto.id }}').click();">

                    📸 Subir prueba

                </button>

            </form>

        </div>

        {% endfor %}

    </div>

    <div class="win" id="win">
        🎉 ¡BINGO COMPLETADO!
    </div>

    <script>

        async function toggle(cell) {

            const id = cell.dataset.id;

            const response = await fetch("/toggle/" + id, {
                method: "POST"
            });

            if (response.ok) {
                cell.classList.toggle("active");
                checkWin();
            }
        }

        function checkWin() {

            const cells = [...document.querySelectorAll(".cell")];

            const size = 5;

            const grid = cells.map(c => c.classList.contains("active"));

            let bingo = false;

            // Filas
            for (let i = 0; i < size; i++) {
                if (grid.slice(i * size, (i + 1) * size).every(Boolean)) {
                    bingo = true;
                }
            }

            // Columnas
            for (let i = 0; i < size; i++) {

                let ok = true;

                for (let j = 0; j < size; j++) {

                    if (!grid[i + j * size]) {
                        ok = false;
                        break;
                    }

                }

                if (ok) {
                    bingo = true;
                }
            }

            // Diagonal principal
            if ([0, 6, 12, 18, 24].every(i => grid[i])) {
                bingo = true;
            }

            // Diagonal secundaria
            if ([4, 8, 12, 16, 20].every(i => grid[i])) {
                bingo = true;
            }

            document.getElementById("win").style.display =
                bingo ? "block" : "none";
        }

        window.onload = checkWin;

    </script>

</body>

</html>
