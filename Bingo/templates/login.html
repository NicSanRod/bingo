<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e1e2f,#2b2b45);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            padding:20px;
        }

        .login{
            width:100%;
            max-width:400px;
            background:#35355c;
            padding:35px;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,.3);
        }

        h1{
            text-align:center;
            font-size:2.2rem;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#cfcfe6;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            margin-bottom:20px;
            background:#444470;
            color:white;
            font-size:1rem;
        }

        input::placeholder{
            color:#b8b8d4;
        }

        input:focus{
            outline:none;
            background:#505080;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#5b8cff;
            color:white;
            font-size:1rem;
            cursor:pointer;
            transition:.2s;
        }

        button:hover{
            background:#7aa2ff;
        }

        .error{
            background:#a52b2b;
            color:white;
            padding:12px;
            border-radius:10px;
            text-align:center;
            margin-bottom:20px;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            color:#cfcfe6;
            text-decoration:none;
        }

        .back:hover{
            color:white;
        }
    </style>
</head>
<body>

<div class="login">

    <h1>🔑 Iniciar sesión</h1>

    <p class="subtitle">
        Accede para guardar y jugar tus bingos.
    </p>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        <label for="nombre">Nombre de usuario</label>

        <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Introduce tu nombre"
            required
        >

        <button type="submit">
            Entrar
        </button>

    </form>

    <a href="/" class="back">
        ⬅ Volver al inicio
    </a>

</div>

</body>
</html>
